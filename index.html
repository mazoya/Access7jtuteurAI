<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access7jtuteur AI</title>
</head>
<body>
    <h1>Welcome to Access7jtuteur AI</h1>

    <form id="email-form">
        <label for="email">Enter your email to proceed:</label>
        <input type="email" id="email" name="email" required>
        <button type="submit">Submit</button>
    </form>

    <div id="verification-step" style="display:none;">
        <h2>Password Verification</h2>
        <form id="password-form">
            <label for="password">Enter your password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Verify</button>
        </form>
    </div>

    <script>
        document.getElementById('email-form').onsubmit = function(event) {
            event.preventDefault();
            // Here you would add your MailerLite integration
            document.getElementById('verification-step').style.display = 'block';
        };
    </script>
</body>
</html>
